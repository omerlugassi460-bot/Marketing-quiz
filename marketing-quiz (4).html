<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="שיווק קוויז">
    <meta name="theme-color" content="#e85d2f">
    <meta name="mobile-web-app-capable" content="yes">
    <title>מבוא לשיווק — קוויז</title>
    <link href="https://fonts.googleapis.com/css2?family=Heebo:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #e85d2f;
            --primary-dark: #c44a20;
            --primary-light: #fde8e0;
            --secondary: #1a1a2e;
            --accent: #f7c948;
            --success: #27ae60;
            --error: #e74c3c;
            --bg: #f5f0eb;
            --card: #ffffff;
            --text: #1a1a2e;
            --text-light: #7a7a9a;
            --border: #e8e0d5;
        }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Heebo', sans-serif;
            background: var(--bg);
            color: var(--text);
            min-height: 100vh;
            background-image:
                radial-gradient(circle at 10% 20%, rgba(232,93,47,0.07) 0%, transparent 50%),
                radial-gradient(circle at 90% 80%, rgba(247,201,72,0.07) 0%, transparent 50%);
        }
        .container { max-width: 820px; margin: 0 auto; padding: 24px 20px; }

        /* Screens */
        .screen { display: none; }
        .screen.active { display: block; }

        /* Header */
        .site-header {
            text-align: center;
            margin-bottom: 32px;
            padding-top: 16px;
        }
        .site-header .tag {
            display: inline-block;
            background: var(--primary);
            color: white;
            font-size: 11px;
            font-weight: 700;
            letter-spacing: 2px;
            text-transform: uppercase;
            padding: 5px 14px;
            border-radius: 20px;
            margin-bottom: 12px;
        }
        .site-header h1 {
            font-size: 36px;
            font-weight: 900;
            color: var(--secondary);
            line-height: 1.1;
            margin-bottom: 6px;
        }
        .site-header h1 span { color: var(--primary); }
        .site-header p {
            font-size: 14px;
            color: var(--text-light);
            font-weight: 400;
        }

        /* Stats bar */
        .stats-bar {
            display: flex;
            justify-content: space-around;
            background: var(--card);
            border-radius: 20px;
            padding: 22px 16px;
            margin-bottom: 28px;
            box-shadow: 0 4px 20px rgba(0,0,0,0.06);
            flex-wrap: wrap;
            gap: 12px;
            border: 1px solid var(--border);
        }
        .stat { text-align: center; min-width: 80px; }
        .stat-number { display: block; font-size: 30px; font-weight: 800; color: var(--primary); line-height: 1; }
        .stat-label { font-size: 12px; color: var(--text-light); margin-top: 4px; font-weight: 500; }

        /* Lesson cards */
        .lesson-list { margin-bottom: 20px; }
        .lesson-card {
            background: var(--card);
            border-radius: 16px;
            padding: 18px 20px;
            margin-bottom: 10px;
            box-shadow: 0 2px 12px rgba(0,0,0,0.05);
            cursor: pointer;
            transition: all 0.2s;
            border: 1.5px solid var(--border);
            display: flex;
            justify-content: space-between;
            align-items: center;
            gap: 12px;
        }
        .lesson-card:hover { transform: translateX(-3px); border-color: var(--primary); box-shadow: 0 4px 20px rgba(232,93,47,0.12); }
        .lesson-card-left { display: flex; align-items: center; gap: 14px; }
        .lesson-num {
            width: 40px; height: 40px;
            background: var(--primary-light);
            color: var(--primary);
            border-radius: 12px;
            display: flex; align-items: center; justify-content: center;
            font-weight: 800; font-size: 15px;
            flex-shrink: 0;
        }
        .lesson-title { font-size: 16px; font-weight: 600; color: var(--text); }
        .lesson-meta { font-size: 12px; color: var(--text-light); margin-top: 2px; }
        .lesson-card-right { display: flex; align-items: center; gap: 10px; flex-shrink: 0; }
        .lesson-badge {
            background: var(--secondary);
            color: white;
            padding: 4px 10px;
            border-radius: 20px;
            font-size: 11px;
            font-weight: 600;
        }
        .best-score {
            font-size: 12px;
            font-weight: 700;
            color: var(--success);
        }
        .arrow-icon { color: var(--text-light); font-size: 18px; }

        /* Buttons */
        .btn {
            display: block; width: 100%;
            padding: 16px 24px;
            border: none; border-radius: 14px;
            font-size: 15px; font-weight: 700;
            cursor: pointer; transition: all 0.2s;
            margin-bottom: 10px;
            font-family: 'Heebo', sans-serif;
        }
        .btn-primary { background: var(--primary); color: white; }
        .btn-primary:hover { background: var(--primary-dark); transform: translateY(-1px); box-shadow: 0 6px 20px rgba(232,93,47,0.3); }
        .btn-secondary { background: var(--card); color: var(--text); border: 2px solid var(--border); }
        .btn-secondary:hover { border-color: var(--primary); color: var(--primary); }
        .btn-accent { background: var(--accent); color: var(--secondary); }
        .btn-accent:hover { background: #e5b830; }
        .back-btn {
            background: none; border: none; cursor: pointer;
            color: var(--primary); font-size: 14px; font-weight: 600;
            margin-bottom: 20px; padding: 8px 0;
            display: flex; align-items: center; gap: 6px;
            font-family: 'Heebo', sans-serif;
        }

        /* Settings */
        .settings-card { background: var(--card); border-radius: 20px; padding: 24px; margin-bottom: 24px; border: 1.5px solid var(--border); }
        .settings-card h3 { font-size: 16px; font-weight: 700; margin-bottom: 16px; color: var(--text); }
        .setting-group { margin-bottom: 14px; }
        .setting-group label { display: block; margin-bottom: 8px; font-weight: 600; font-size: 14px; }
        .setting-group select {
            width: 100%; padding: 12px 14px;
            border: 2px solid var(--border); border-radius: 10px;
            font-size: 15px; font-family: 'Heebo', sans-serif;
            background: white; color: var(--text);
        }
        .checkbox-label { display: flex; align-items: center; gap: 10px; cursor: pointer; font-size: 14px; font-weight: 500; }
        .checkbox-label input { width: 18px; height: 18px; accent-color: var(--primary); }

        /* Quiz screen */
        .quiz-header {
            display: flex; justify-content: space-between; align-items: center;
            margin-bottom: 16px; flex-wrap: wrap; gap: 10px;
        }
        .quiz-lesson-name { font-size: 13px; font-weight: 600; color: var(--text-light); }
        .quiz-counter { font-size: 18px; font-weight: 800; color: var(--text); }
        .quiz-counter span { color: var(--primary); }

        .progress-bar { height: 6px; background: var(--border); border-radius: 3px; margin-bottom: 24px; overflow: hidden; }
        .progress-fill { height: 100%; background: linear-gradient(90deg, var(--primary), var(--accent)); transition: width 0.4s cubic-bezier(0.4,0,0.2,1); border-radius: 3px; }

        .question-card {
            background: var(--card); border-radius: 20px; padding: 28px;
            margin-bottom: 16px; border: 1.5px solid var(--border);
            box-shadow: 0 4px 20px rgba(0,0,0,0.05);
        }
        .question-type-badge {
            display: inline-block;
            font-size: 11px; font-weight: 700; letter-spacing: 1px;
            padding: 4px 12px; border-radius: 20px;
            margin-bottom: 14px;
            background: var(--primary-light); color: var(--primary);
        }
        .question-type-badge.scenario { background: #fff3cd; color: #856404; }
        .question-type-badge.short { background: #d4edda; color: #155724; }
        .question-num { font-size: 12px; font-weight: 600; color: var(--text-light); margin-bottom: 8px; }
        .question-text { font-size: 19px; line-height: 1.65; font-weight: 500; color: var(--text); }

        /* Answers */
        .answers-container { display: flex; flex-direction: column; gap: 10px; margin-top: 20px; }
        .answer-btn {
            display: flex; align-items: flex-start; gap: 14px;
            padding: 14px 16px;
            background: var(--bg); border: 2px solid var(--border);
            border-radius: 12px; cursor: pointer;
            transition: all 0.18s; text-align: right;
            font-family: 'Heebo', sans-serif;
        }
        .answer-btn:hover:not(.disabled) { border-color: var(--primary); background: #fff8f5; transform: translateX(-2px); }
        .answer-btn.correct { border-color: var(--success); background: #e8f8f0; }
        .answer-btn.wrong { border-color: var(--error); background: #fdecea; }
        .answer-btn.disabled { cursor: default; }
        .answer-letter {
            min-width: 30px; height: 30px;
            display: flex; align-items: center; justify-content: center;
            background: var(--border); border-radius: 8px;
            font-weight: 700; font-size: 13px;
            flex-shrink: 0; margin-top: 2px;
        }
        .answer-btn.correct .answer-letter { background: var(--success); color: white; }
        .answer-btn.wrong .answer-letter { background: var(--error); color: white; }
        .answer-text { flex: 1; font-size: 15px; line-height: 1.55; font-weight: 400; padding-top: 3px; }

        /* Explanation */
        .explanation-box {
            background: var(--card); border-radius: 14px; padding: 16px 20px;
            margin-bottom: 16px; display: none;
            border-right: 4px solid var(--success);
            box-shadow: 0 2px 12px rgba(0,0,0,0.05);
        }
        .explanation-box.wrong { border-right-color: var(--error); }
        .explanation-box.show { display: block; }
        .explanation-head { display: flex; align-items: center; gap: 8px; margin-bottom: 8px; }
        .exp-icon {
            width: 26px; height: 26px;
            display: flex; align-items: center; justify-content: center;
            background: var(--success); color: white;
            border-radius: 50%; font-weight: 700; font-size: 13px; flex-shrink: 0;
        }
        .explanation-box.wrong .exp-icon { background: var(--error); }
        .exp-title { font-weight: 700; font-size: 16px; }
        .exp-text { color: var(--text-light); line-height: 1.6; font-size: 14px; }

        /* Navigation */
        .quiz-nav {
            display: flex; justify-content: space-between; gap: 10px; flex-wrap: wrap;
            align-items: center;
        }
        .quiz-nav .btn { flex: 1; margin-bottom: 0; min-width: 110px; }
        .nav-hint {
            font-size: 12px; color: var(--text-light); text-align: center;
            width: 100%; margin-top: 8px;
        }
        .arrow-nav-btn {
            display: flex; align-items: center; justify-content: center; gap: 6px;
            padding: 14px 20px; border-radius: 12px; font-size: 14px; font-weight: 700;
            border: 2px solid var(--border); background: var(--card); cursor: pointer;
            transition: all 0.18s; font-family: 'Heebo', sans-serif; flex: 1; min-width: 100px;
        }
        .arrow-nav-btn:hover { border-color: var(--primary); color: var(--primary); }
        .arrow-nav-btn:disabled { opacity: 0.35; cursor: default; }

        /* Results */
        .results-card {
            background: var(--card); border-radius: 24px; padding: 36px;
            text-align: center; margin-bottom: 24px;
            box-shadow: 0 8px 32px rgba(0,0,0,0.08);
            border: 1.5px solid var(--border);
        }
        .results-card h2 { font-size: 24px; font-weight: 800; margin-bottom: 24px; }
        .score-ring {
            width: 160px; height: 160px; margin: 0 auto 28px;
            border-radius: 50%;
            background: conic-gradient(var(--primary) 0deg, var(--accent) 180deg, var(--border) 180deg);
            display: flex; align-items: center; justify-content: center;
            position: relative;
        }
        .score-ring::before {
            content: ''; position: absolute;
            width: 130px; height: 130px; border-radius: 50%;
            background: var(--card);
        }
        .score-inner { position: relative; z-index: 1; text-align: center; }
        .score-number { display: block; font-size: 44px; font-weight: 900; color: var(--primary); line-height: 1; }
        .score-pct { font-size: 20px; font-weight: 700; color: var(--text-light); }
        .result-rows { text-align: right; border-top: 1px solid var(--border); padding-top: 20px; }
        .result-row { display: flex; justify-content: space-between; padding: 10px 0; border-bottom: 1px solid var(--border); font-size: 15px; }
        .result-row:last-child { border-bottom: none; }

        /* Review */
        .review-item {
            background: var(--card); border-radius: 14px; padding: 18px;
            margin-bottom: 12px; border-right: 4px solid var(--success);
        }
        .review-item.wrong { border-right-color: var(--error); }
        .review-q { font-weight: 700; margin-bottom: 10px; line-height: 1.5; font-size: 15px; }
        .review-a { font-size: 13px; color: var(--text-light); line-height: 1.6; }
        .review-a div { margin-bottom: 4px; }

        /* All questions btn */
        .all-btn-wrap { text-align: center; }

        /* Keyboard hint badge */
        .keyboard-hint {
            display: inline-flex; align-items: center; gap: 6px;
            background: var(--secondary); color: white;
            padding: 6px 14px; border-radius: 20px; font-size: 12px;
            font-weight: 600; margin-bottom: 20px;
        }
        .key-badge {
            background: rgba(255,255,255,0.2); border-radius: 5px;
            padding: 2px 6px; font-size: 11px;
        }

        /* Swipe animation */
        .question-card, .explanation-box {
            transition: transform 0.25s cubic-bezier(0.4,0,0.2,1), opacity 0.25s;
        }
        .slide-out-left { transform: translateX(-60px); opacity: 0; pointer-events: none; }
        .slide-out-right { transform: translateX(60px); opacity: 0; pointer-events: none; }
        .slide-in-left { animation: slideInLeft 0.25s cubic-bezier(0.4,0,0.2,1); }
        .slide-in-right { animation: slideInRight 0.25s cubic-bezier(0.4,0,0.2,1); }
        @keyframes slideInLeft {
            from { transform: translateX(60px); opacity: 0; }
            to   { transform: translateX(0); opacity: 1; }
        }
        @keyframes slideInRight {
            from { transform: translateX(-60px); opacity: 0; }
            to   { transform: translateX(0); opacity: 1; }
        }

        /* Touch hint */
        .swipe-hint {
            display: flex; align-items: center; justify-content: center; gap: 8px;
            background: var(--secondary); color: white;
            padding: 7px 16px; border-radius: 20px; font-size: 12px;
            font-weight: 600; margin-bottom: 16px; width: fit-content;
        }

        @media (max-width: 600px) {
            body { -webkit-tap-highlight-color: transparent; }
            .container { padding: 12px 12px; padding-bottom: 24px; }
            .site-header { margin-bottom: 20px; padding-top: 8px; }
            .site-header h1 { font-size: 28px; }
            .stats-bar { padding: 16px 12px; margin-bottom: 20px; gap: 6px; }
            .stat-number { font-size: 26px; }
            .lesson-card { padding: 14px 14px; margin-bottom: 8px; }
            .lesson-title { font-size: 14px; }
            .lesson-meta { font-size: 11px; }
            .lesson-num { width: 36px; height: 36px; font-size: 13px; border-radius: 10px; }
            .quiz-header { margin-bottom: 10px; }
            .quiz-lesson-name { font-size: 12px; max-width: 60%; }
            .quiz-counter { font-size: 16px; }
            .question-card { padding: 18px 16px; border-radius: 16px; margin-bottom: 12px; }
            .question-text { font-size: 16px; line-height: 1.6; }
            .answers-container { gap: 8px; margin-top: 16px; }
            .answer-btn {
                padding: 14px 14px;
                border-radius: 10px;
                min-height: 52px;
                align-items: center;
            }
            .answer-letter { min-width: 32px; height: 32px; font-size: 14px; border-radius: 8px; }
            .answer-text { font-size: 14px; line-height: 1.5; }
            .explanation-box { padding: 14px 16px; border-radius: 12px; }
            .exp-text { font-size: 13px; }
            .quiz-nav { gap: 8px; }
            .arrow-nav-btn { padding: 14px 12px; font-size: 13px; min-width: 80px; min-height: 50px; }
            .btn { padding: 16px 20px; font-size: 15px; min-height: 52px; border-radius: 12px; }
            .score-number { font-size: 36px; }
            .results-card { padding: 24px 20px; }
            .keyboard-hint { display: none; }
            .swipe-hint { display: flex; }
            .settings-card { padding: 18px 16px; }
            .review-item { padding: 14px; }
            .review-q { font-size: 14px; }
        }
        @media (min-width: 601px) {
            .swipe-hint { display: none; }
        }
    </style>
</head>
<body>
<div class="container">

    <!-- ========== מסך ראשי ========== -->
    <div id="home-screen" class="screen active">
        <div class="site-header">
            <div class="tag">📊 קורס</div>
            <h1>מבוא <span>לשיווק</span></h1>
            <p>50 שאלות | 13 שיעורים</p>
        </div>

        <div class="stats-bar">
            <div class="stat">
                <span class="stat-number" id="total-quizzes">0</span>
                <span class="stat-label">מבחנים</span>
            </div>
            <div class="stat">
                <span class="stat-number" id="completed-quizzes">0</span>
                <span class="stat-label">הושלמו</span>
            </div>
            <div class="stat">
                <span class="stat-number" id="avg-score">0%</span>
                <span class="stat-label">ממוצע</span>
            </div>
        </div>

        <div class="lesson-list" id="lesson-list"></div>

        <div class="all-btn-wrap">
            <button class="btn btn-accent" onclick="showAllQuestions()">📝 כל 50 השאלות ביחד</button>
        </div>
    </div>

    <!-- ========== מסך הגדרות ========== -->
    <div id="settings-screen" class="screen">
        <button class="back-btn" onclick="showScreen('home-screen')">→ חזרה</button>
        <h2 style="font-size:22px;font-weight:800;margin-bottom:20px;" id="quiz-title">הגדרות מבחן</h2>

        <div class="settings-card">
            <h3>⚙️ הגדרות</h3>
            <div class="setting-group">
                <label>סוג שאלות:</label>
                <select id="question-type">
                    <option value="all">הכל</option>
                    <option value="medium">בינוניות בלבד</option>
                    <option value="short">קצרות בלבד</option>
                    <option value="scenario">מורכבות-תרחיש בלבד</option>
                </select>
            </div>
            <div class="setting-group">
                <label class="checkbox-label">
                    <input type="checkbox" id="shuffle-questions" checked>
                    ערבוב שאלות
                </label>
            </div>
            <div class="setting-group">
                <label class="checkbox-label">
                    <input type="checkbox" id="shuffle-answers" checked>
                    ערבוב תשובות
                </label>
            </div>
            <div class="setting-group">
                <label class="checkbox-label">
                    <input type="checkbox" id="show-explanation" checked>
                    הצגת הסבר אחרי תשובה
                </label>
            </div>
        </div>

        <button class="btn btn-primary" onclick="startQuiz()">🚀 התחל מבחן</button>
    </div>

    <!-- ========== מסך קוויז ========== -->
    <div id="quiz-screen" class="screen">
        <div class="quiz-header">
            <button class="back-btn" style="margin-bottom:0" onclick="confirmExit()">→ יציאה</button>
            <div class="quiz-lesson-name" id="quiz-lesson-label"></div>
            <div class="quiz-counter"><span id="current-q">1</span> / <span id="total-q">10</span></div>
        </div>

        <div class="progress-bar">
            <div class="progress-fill" id="progress-fill" style="width:0%"></div>
        </div>

        <div class="keyboard-hint">
            <span class="key-badge">←</span>
            ניווט בחצי המקלדת
            <span class="key-badge">→</span>
        </div>
        <div class="swipe-hint">
            👆 החלק שמאלה/ימינה לניווט
        </div>

        <div id="question-card-wrap">
        <div class="question-card">
            <div class="question-num" id="question-num"></div>
            <span class="question-type-badge" id="type-badge">בינונית</span>
            <p class="question-text" id="question-text"></p>
            <div class="answers-container" id="answers-container"></div>
        </div>

        <div class="explanation-box" id="explanation-box">
            <div class="explanation-head">
                <span class="exp-icon" id="exp-icon">✓</span>
                <span class="exp-title" id="exp-title">תשובה נכונה!</span>
            </div>
            <p class="exp-text" id="exp-text"></p>
        </div>

        </div><!-- /question-card-wrap -->

        <div class="quiz-nav">
            <button class="arrow-nav-btn" id="prev-btn" onclick="prevQuestion()" disabled>→ הקודם</button>
            <button class="btn btn-primary" id="skip-btn" onclick="skipQuestion()" style="flex:1;min-width:110px;margin-bottom:0">דלג ⏭</button>
            <button class="arrow-nav-btn" id="next-btn" onclick="nextQuestion()" style="display:none">הבא ←</button>
        </div>
        <div class="nav-hint">מקלדת ←→ | החלק על המסך לניווט</div>
    </div>

    <!-- ========== מסך תוצאות ========== -->
    <div id="results-screen" class="screen">
        <div class="results-card">
            <h2>🎉 סיימת!</h2>
            <div class="score-ring" id="score-ring">
                <div class="score-inner">
                    <span class="score-number" id="final-score">0</span>
                    <span class="score-pct">%</span>
                </div>
            </div>
            <div class="result-rows">
                <div class="result-row"><span>✅ תשובות נכונות:</span><span id="correct-count">0</span></div>
                <div class="result-row"><span>❌ תשובות שגויות:</span><span id="wrong-count">0</span></div>
                <div class="result-row"><span>📊 סה"כ שאלות:</span><span id="total-count">0</span></div>
            </div>
        </div>
        <button class="btn btn-secondary" onclick="reviewQuiz()">📝 סקירת תשובות</button>
        <button class="btn btn-primary" onclick="showScreen('settings-screen')">🔁 מבחן נוסף</button>
        <button class="btn btn-secondary" onclick="showScreen('home-screen')">🏠 חזרה לראשי</button>
    </div>

// לוגיקה
// ===========================
let currentLesson = null;
let currentQuestions = [];
let currentQuestionIndex = 0;
let userAnswers = [];
let skippedQuestions = [];
let quizSettings = {};

// Map type string to display
const typeLabels = { medium: "בינונית", short: "קצרה", scenario: "מורכבת-תרחיש" };
const typeBadgeClass = { medium: "", short: "short", scenario: "scenario" };

document.addEventListener('DOMContentLoaded', () => {
    loadLessons();
    loadStats();
    document.addEventListener('keydown', handleKeyNav);
});

function handleKeyNav(e) {
    const quizActive = document.getElementById('quiz-screen').classList.contains('active');
    if (!quizActive) return;

    if (e.key === 'ArrowLeft' || e.key === 'ArrowRight') {
        e.preventDefault();
        // ArrowLeft = next (RTL), ArrowRight = prev
        if (e.key === 'ArrowLeft') {
            const nextBtn = document.getElementById('next-btn');
            if (nextBtn && nextBtn.style.display !== 'none') nextQuestion();
        } else {
            const prevBtn = document.getElementById('prev-btn');
            if (prevBtn && !prevBtn.disabled) prevQuestion();
        }
    }
}

function loadLessons() {
    const list = document.getElementById('lesson-list');
    list.innerHTML = '';
    const history = getHistory();
    lessonsData.forEach((lesson, i) => {
        const card = document.createElement('div');
        card.className = 'lesson-card';
        card.onclick = () => selectLesson(lesson);

        const lessonHistory = history.filter(h => h.lessonId === lesson.id);
        const bestScore = lessonHistory.length > 0 ? Math.max(...lessonHistory.map(h => h.score)) : null;

        card.innerHTML = `
            <div class="lesson-card-left">
                <div class="lesson-num">${i+1}</div>
                <div>
                    <div class="lesson-title">${lesson.name}</div>
                    <div class="lesson-meta">${lesson.questions.length} שאלות</div>
                </div>
            </div>
            <div class="lesson-card-right">
                ${bestScore !== null ? `<span class="best-score">🏆 ${bestScore}%</span>` : '<span style="font-size:12px;color:var(--text-light)">טרם נפתר</span>'}
                <span class="lesson-badge">${lesson.questions.length}</span>
            </div>
        `;
        list.appendChild(card);
    });
}

function selectLesson(lesson) {
    currentLesson = lesson;
    document.getElementById('quiz-title').textContent = lesson.name;
    showScreen('settings-screen');
}

function showAllQuestions() {
    currentLesson = {
        id: 'all',
        name: 'כל השאלות',
        questions: lessonsData.flatMap(l => l.questions)
    };
    document.getElementById('quiz-title').textContent = `כל השאלות (${currentLesson.questions.length})`;
    showScreen('settings-screen');
}

function startQuiz() {
    quizSettings = {
        questionType: document.getElementById('question-type').value,
        shuffle: document.getElementById('shuffle-questions').checked,
        shuffleAnswers: document.getElementById('shuffle-answers').checked,
        showExplanation: document.getElementById('show-explanation').checked
    };

    let questions = [...currentLesson.questions];
    if (quizSettings.questionType !== 'all') {
        questions = questions.filter(q => q.type === quizSettings.questionType);
    }
    if (questions.length === 0) {
        alert('אין שאלות מסוג זה בשיעור זה.');
        return;
    }
    if (quizSettings.shuffle) questions = shuffleArray(questions);
    if (quizSettings.shuffleAnswers) {
        questions = questions.map(q => {
            const indexed = q.answers.map((a, i) => ({ text: a, orig: i }));
            const shuffled = shuffleArray(indexed);
            const newCorrect = shuffled.findIndex(a => a.orig === q.correct);
            return { ...q, answers: shuffled.map(a => a.text), correct: newCorrect };
        });
    }

    currentQuestions = questions;
    currentQuestionIndex = 0;
    userAnswers = new Array(questions.length).fill(null);
    skippedQuestions = [];

    document.getElementById('quiz-lesson-label').textContent = currentLesson.name;
    showScreen('quiz-screen');
    showQuestion();
}

function showQuestion() {
    const q = currentQuestions[currentQuestionIndex];
    const total = currentQuestions.length;
    const idx = currentQuestionIndex;

    // Animate card
    const card = document.getElementById('question-card-wrap');
    if (card) {
        const dir = (idx >= (window._lastQIdx || 0)) ? 'slide-in-left' : 'slide-in-right';
        card.classList.remove('slide-in-left', 'slide-in-right');
        void card.offsetWidth;
        card.classList.add(dir);
    }
    window._lastQIdx = idx;
    document.getElementById('current-q').textContent = idx + 1;
    document.getElementById('total-q').textContent = total;
    document.getElementById('progress-fill').style.width = ((idx / total) * 100) + '%';
    document.getElementById('question-num').textContent = `שאלה ${idx + 1} מתוך ${total}`;

    const badge = document.getElementById('type-badge');
    badge.textContent = typeLabels[q.type] || q.type;
    badge.className = 'question-type-badge ' + (typeBadgeClass[q.type] || '');
    document.getElementById('question-text').textContent = q.question;

    const answersDiv = document.getElementById('answers-container');
    answersDiv.innerHTML = '';
    const letters = ['א', 'ב', 'ג', 'ד', 'ה'];
    q.answers.forEach((ans, i) => {
        const btn = document.createElement('button');
        btn.className = 'answer-btn';
        btn.innerHTML = `<span class="answer-letter">${letters[i]}</span><span class="answer-text">${ans}</span>`;
        if (userAnswers[idx] !== null) {
            btn.classList.add('disabled');
            if (i === q.correct) btn.classList.add('correct');
            else if (i === userAnswers[idx]) btn.classList.add('wrong');
        } else {
            btn.onclick = () => selectAnswer(i);
        }
        answersDiv.appendChild(btn);
    });

    // Explanation
    const expBox = document.getElementById('explanation-box');
    expBox.className = 'explanation-box';
    if (userAnswers[idx] !== null && quizSettings.showExplanation && q.explanation) {
        const isCorrect = userAnswers[idx] === q.correct;
        expBox.classList.add('show');
        if (!isCorrect) expBox.classList.add('wrong');
        document.getElementById('exp-icon').textContent = isCorrect ? '✓' : '✗';
        document.getElementById('exp-title').textContent = isCorrect ? 'תשובה נכונה!' : 'תשובה שגויה';
        document.getElementById('exp-text').textContent = q.explanation;
    }

    // Nav buttons
    const prevBtn = document.getElementById('prev-btn');
    const nextBtn = document.getElementById('next-btn');
    const skipBtn = document.getElementById('skip-btn');

    prevBtn.disabled = idx === 0;
    if (userAnswers[idx] !== null) {
        skipBtn.style.display = 'none';
        nextBtn.style.display = 'flex';
        nextBtn.textContent = idx === total - 1 ? 'סיום ✅' : 'הבא ←';
    } else {
        skipBtn.style.display = 'flex';
        nextBtn.style.display = 'none';
    }
}

function selectAnswer(answerIndex) {
    if (userAnswers[currentQuestionIndex] !== null) return;
    userAnswers[currentQuestionIndex] = answerIndex;
    showQuestion();
}

function nextQuestion() {
    if (currentQuestionIndex < currentQuestions.length - 1) {
        currentQuestionIndex++;
        showQuestion();
    } else {
        if (skippedQuestions.length > 0) {
            currentQuestionIndex = skippedQuestions.shift();
            showQuestion();
        } else {
            finishQuiz();
        }
    }
}

function prevQuestion() {
    if (currentQuestionIndex > 0) {
        currentQuestionIndex--;
        showQuestion();
    }
}

function skipQuestion() {
    if (userAnswers[currentQuestionIndex] !== null) return;
    if (!skippedQuestions.includes(currentQuestionIndex)) {
        skippedQuestions.push(currentQuestionIndex);
    }
    if (currentQuestionIndex < currentQuestions.length - 1) {
        currentQuestionIndex++;
        showQuestion();
    } else if (skippedQuestions.length > 0) {
        currentQuestionIndex = skippedQuestions.shift();
        showQuestion();
    }
}

function finishQuiz() {
    let correct = 0;
    currentQuestions.forEach((q, i) => {
        if (userAnswers[i] === q.correct) correct++;
    });
    const score = Math.round((correct / currentQuestions.length) * 100);

    document.getElementById('final-score').textContent = score;
    document.getElementById('correct-count').textContent = correct;
    document.getElementById('wrong-count').textContent = currentQuestions.length - correct;
    document.getElementById('total-count').textContent = currentQuestions.length;

    // Update score ring
    const ring = document.getElementById('score-ring');
    const deg = (score / 100) * 360;
    ring.style.background = `conic-gradient(var(--primary) 0deg, var(--accent) ${deg}deg, var(--border) ${deg}deg)`;

    saveToHistory({ lessonId: currentLesson.id, lessonName: currentLesson.name, date: new Date().toISOString(), score, correct, total: currentQuestions.length, completed: true });
    loadStats();
    showScreen('results-screen');
}

function reviewQuiz() {
    const list = document.getElementById('review-list');
    list.innerHTML = '';
    const letters = ['א', 'ב', 'ג', 'ד', 'ה'];
    currentQuestions.forEach((q, i) => {
        const isCorrect = userAnswers[i] === q.correct;
        const item = document.createElement('div');
        item.className = 'review-item' + (isCorrect ? '' : ' wrong');
        const yourAns = userAnswers[i] !== null ? q.answers[userAnswers[i]] : 'לא נענתה';
        const correctAns = q.answers[q.correct];
        item.innerHTML = `
            <div class="review-q">${i+1}. ${q.question}</div>
            <div class="review-a">
                <div>תשובתך: ${yourAns}</div>
                <div style="color:var(--success)">✅ תשובה נכונה: ${correctAns}</div>
                ${q.explanation ? `<div style="margin-top:6px;color:var(--text-light)">${q.explanation}</div>` : ''}
            </div>
        `;
        list.appendChild(item);
    });
    showScreen('review-screen');
}

function getHistory() { return JSON.parse(localStorage.getItem('marketingQuizHistory') || '[]'); }
function saveToHistory(entry) {
    const h = getHistory(); h.push(entry);
    localStorage.setItem('marketingQuizHistory', JSON.stringify(h));
}
function loadStats() {
    const h = getHistory();
    document.getElementById('total-quizzes').textContent = h.length;
    document.getElementById('completed-quizzes').textContent = h.filter(x => x.completed).length;
    document.getElementById('avg-score').textContent = h.length > 0 ? Math.round(h.reduce((s, x) => s + x.score, 0) / h.length) + '%' : '0%';
}
function showScreen(id) {
    document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
    document.getElementById(id).classList.add('active');
    window.scrollTo(0, 0);
}
function shuffleArray(arr) {
    const a = [...arr];
    for (let i = a.length - 1; i > 0; i--) {
        const j = Math.floor(Math.random() * (i + 1));
        [a[i], a[j]] = [a[j], a[i]];
    }
    return a;
}
function confirmExit() {
    if (confirm('לצאת? ההתקדמות לא תישמר.')) showScreen('home-screen');
}
</script>
